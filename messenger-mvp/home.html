<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>홈</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="phone">
        <div class="statusbar">
            <span>9:41</span>
            <span>●●● 100%</span>
        </div>
        <main class="screen">
            <header class="header">
                <h1>Talk</h1>
                <button class="icon-btn" data-toast="새 대화 만들기">＋</button>
            </header>
            <section class="content">
                <div class="home-hero">
                    <h2>안녕하세요 👋</h2>
                    <p>친구, 채팅, 프로필, 설정까지 MVP 핵심 흐름을 클릭하면서 확인할 수 있습니다.</p>
                </div>
                <div class="home-grid">
                    <a class="home-card" href="pages/friends.html">
                        <div class="num" data-home-friend-count>0</div>
                        <div class="label">친구</div>
                    </a>
                    <a class="home-card" href="pages/chat_list.html">
                        <div class="num" data-home-chat-count>0</div>
                        <div class="label">채팅방</div>
                    </a>
                    <a class="home-card" href="pages/profile.html">
                        <div class="num">😀</div>
                        <div class="label">내 프로필</div>
                    </a>
                    <a class="home-card" href="pages/settings.html">
                        <div class="num">⚙️</div>
                        <div class="label">설정</div>
                    </a>
                </div>
            </section>
            <nav class="tabbar">
                <a class="tab active" href="home.html"><span>🏠</span>홈</a>
                <a class="tab" href="pages/friends.html"><span>👥</span>친구</a>
                <a class="tab" href="pages/chat_list.html"><span>💬</span>채팅</a>
                <a class="tab" href="pages/settings.html"><span>⚙️</span>설정</a>
            </nav>
        </main>
    </div>
    <script src="assets/js/home_bootstrap.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
