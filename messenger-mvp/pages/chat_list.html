<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>채팅</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="phone">
        <div class="statusbar">
            <span>9:41</span>
            <span>100%</span>
        </div>
        <main class="screen">
            <header class="header">
                <h1>채팅</h1>
                <button class="icon-btn" type="button" data-action="open-chat-create" aria-label="채팅방 만들기">＋</button>
            </header>
            <section class="content">
                <div class="search">채팅방 검색</div>
                <div class="list">
                    <a class="row" href="chat_room.html">
                        <div class="avatar">💬</div>
                        <div class="row-main">
                            <div class="name">아영</div>
                            <div class="desc">오늘 점심 먹었어?</div>
                        </div>
                        <div>
                            <div class="time">오전 10:12</div>
                            <div class="badge">2</div>
                        </div>
                    </a>
                    <a class="row" href="chat_room.html">
                        <div class="avatar">📘</div>
                        <div class="row-main">
                            <div class="name">프로젝트 팀</div>
                            <div class="desc">이번 주 일정 공유 부탁드립니다.</div>
                        </div>
                        <div class="time">어제</div>
                    </a>
                    <a class="row" href="chat_room.html">
                        <div class="avatar">🍀</div>
                        <div class="row-main">
                            <div class="name">민수</div>
                            <div class="desc">사진 보냈어요!</div>
                        </div>
                        <div class="time">08/27</div>
                    </a>
                    <a class="row" href="chat_room.html">
                        <div class="avatar">✨</div>
                        <div class="row-main">
                            <div class="name">서윤</div>
                            <div class="desc">확인했습니다.</div>
                        </div>
                        <div class="time">6/20</div>
                    </a>
                </div>
            </section>
            <nav class="tabbar">
                <a class="tab" href="../home.html"><span>⌂</span>홈</a>
                <a class="tab" href="friends.html"><span>👥</span>친구</a>
                <a class="tab active" href="chat_list.html"><span>💬</span>채팅</a>
                <a class="tab" href="settings.html"><span>⚙</span>설정</a>
            </nav>
            <div class="chat-create-overlay" hidden>
                <div class="chat-create-sheet" role="dialog" aria-modal="true" aria-label="채팅방 만들기">
                    <div class="chat-create-handle" aria-hidden="true"></div>
                    <div class="chat-create-header">
                        <div class="chat-create-title">채팅방 만들기</div>
                        <div class="chat-create-subtitle">친구를 선택한 뒤 다음을 누르세요.</div>
                    </div>
                    <div class="chat-create-selected" hidden>
                        <span class="chat-create-selected-label">선택됨</span>
                        <div class="chat-create-selected-list"></div>
                    </div>
                    <div class="chat-create-title-wrap" hidden>
                        <input class="chat-create-title-input" type="text" placeholder="채팅방 제목을 입력하세요" maxlength="20">
                    </div>
                    <div class="chat-create-list">
                        <button type="button" class="chat-create-item" data-name="아영">
                            <span class="chat-create-check" aria-hidden="true"></span>
                            <span class="chat-create-avatar">💬</span>
                            <span class="chat-create-name">아영</span>
                        </button>
                        <button type="button" class="chat-create-item" data-name="민수">
                            <span class="chat-create-check" aria-hidden="true"></span>
                            <span class="chat-create-avatar">📘</span>
                            <span class="chat-create-name">민수</span>
                        </button>
                        <button type="button" class="chat-create-item" data-name="지훈">
                            <span class="chat-create-check" aria-hidden="true"></span>
                            <span class="chat-create-avatar">🍀</span>
                            <span class="chat-create-name">지훈</span>
                        </button>
                        <button type="button" class="chat-create-item" data-name="서윤">
                            <span class="chat-create-check" aria-hidden="true"></span>
                            <span class="chat-create-avatar">✨</span>
                            <span class="chat-create-name">서윤</span>
                        </button>
                    </div>
                    <div class="chat-create-actions">
                        <button type="button" class="btn light chat-create-cancel">취소</button>
                        <button type="button" class="btn primary chat-create-next" disabled>다음</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/app.js"></script>
</body>

</html>
