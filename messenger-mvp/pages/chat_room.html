<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>채팅방</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="phone">
        <div class="statusbar">
            <span>9:41</span>
            <span>100%</span>
        </div>
        <main class="screen">
            <header class="header">
                <a class="back" href="chat_list.html">←</a>
                <div class="chat-room-title">
                    <h1 class="small-title">아영</h1>
                    <span class="small-title-count" hidden></span>
                </div>
                <button class="icon-btn" data-toast="채팅방 메뉴">☰</button>
            </header>
            <section class="chat-area">
                <div class="date-chip">2026년 6월 27일 토요일</div>
                <div class="msg other" data-message="안녕하세요!">
                    <div class="avatar" style="width:34px;height:34px;border-radius:12px;font-size:18px">💬</div>
                    <div class="bubble">안녕하세요!</div>
                </div>
                <div class="msg me" data-message="네 안녕하세요.">
                    <div class="bubble">네 안녕하세요.</div>
                </div>
                <div class="msg other" data-message="오늘 점심 먹었어?">
                    <div class="avatar" style="width:34px;height:34px;border-radius:12px;font-size:18px">💬</div>
                    <div class="bubble">오늘 점심 먹었어?</div>
                </div>
                <div class="msg me" data-message="아직이야. 같이 먹을까요?">
                    <div class="bubble">아직이야. 같이 먹을까요?</div>
                </div>
                <div class="msg other" data-message="좋아요. 12시에 만나요.">
                    <div class="avatar" style="width:34px;height:34px;border-radius:12px;font-size:18px">💬</div>
                    <div class="bubble">좋아요. 12시에 만나요.</div>
                </div>
            </section>
            <div class="chat-input">
                <div class="reply-preview" hidden>
                    <div class="reply-label">답장</div>
                    <div class="reply-text"></div>
                    <button type="button" class="reply-cancel" aria-label="답장 취소">×</button>
                </div>
                <button class="icon-btn" data-toast="사진 전송">＋</button>
                <input class="chat-compose" placeholder="메시지를 입력하세요">
                <button class="send" type="button">→</button>
            </div>
            <div class="selection-bar" hidden>
                <button type="button" class="selection-bar-cancel">취소</button>
                <button type="button" class="selection-bar-primary" disabled>저장</button>
            </div>
        </main>
    </div>
    <div class="message-menu-overlay" hidden>
        <div class="message-menu" role="dialog" aria-modal="true" aria-label="메시지 메뉴">
            <div class="message-menu-handle" aria-hidden="true"></div>
            <div class="message-menu-header">
                <div class="message-menu-title">메시지</div>
                <div class="message-menu-preview">선택한 대화</div>
            </div>
            <button type="button" class="message-menu-item" data-action="reply"><span class="menu-emoji">↩</span><span>답장</span></button>
            <button type="button" class="message-menu-item" data-action="copy"><span class="menu-emoji">⧉</span><span>복사</span></button>
            <button type="button" class="message-menu-item" data-action="save"><span class="menu-emoji">★</span><span>저장</span></button>
            <button type="button" class="message-menu-item danger" data-action="delete"><span class="menu-emoji">🗑</span><span>삭제</span></button>
            <button type="button" class="message-menu-item cancel" data-action="cancel"><span class="menu-emoji">×</span><span>취소</span></button>
        </div>
    </div>
    <script src="../assets/js/app.js"></script>
</body>

</html>
