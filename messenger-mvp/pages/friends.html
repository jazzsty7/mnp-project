<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>친구</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="phone">
        <div class="statusbar">
            <span>9:41</span>
            <span>100%</span>
        </div>
        <main class="screen">
            <header class="header">
                <h1>친구</h1>
                <button class="icon-btn" type="button" data-action="open-friend-add" aria-label="친구 추가">＋</button>
            </header>
            <section class="content">
                <input class="search friend-search" type="search" placeholder="친구 검색">
                <div class="list" data-friend-list></div>
            </section>
            <nav class="tabbar">
                <a class="tab" href="../home.html"><span>🏠</span>홈</a>
                <a class="tab active" href="friends.html"><span>👥</span>친구</a>
                <a class="tab" href="chat_list.html"><span>💬</span>채팅</a>
                <a class="tab" href="settings.html"><span>⚙️</span>설정</a>
            </nav>
            <div class="friend-add-overlay" hidden>
                <div class="friend-add-sheet" role="dialog" aria-modal="true" aria-label="친구 추가">
                    <div class="friend-add-handle" aria-hidden="true"></div>
                    <div class="friend-add-header">
                        <div class="friend-add-title">친구 추가</div>
                        <div class="friend-add-subtitle">새 친구의 이름을 입력하면 목록에 바로 추가됩니다.</div>
                    </div>
                    <div class="friend-add-body">
                        <input class="friend-add-input friend-add-name-input" type="text" placeholder="친구 이름을 입력하세요" maxlength="20">
                        <input class="friend-add-input friend-add-avatar-input" type="text" placeholder="프로필 이미지 URL 또는 이모지(선택)" maxlength="200">
                        <input class="friend-add-input friend-add-status-input" type="text" placeholder="상태메시지(선택)" maxlength="40">
                        <input class="friend-add-input friend-add-desc-input" type="text" placeholder="소개 문구(선택)" maxlength="40">
                    </div>
                    <div class="friend-add-actions">
                        <button type="button" class="btn light friend-add-cancel">취소</button>
                        <button type="button" class="btn primary friend-add-submit">추가</button>
                    </div>
                </div>
            </div>
            <div class="friend-menu-overlay" hidden>
                <div class="friend-menu" role="dialog" aria-modal="true" aria-label="친구 메뉴">
                    <div class="friend-menu-header">
                        <div class="friend-menu-name"></div>
                    </div>
                    <button type="button" class="friend-menu-item friend-menu-edit">정보변경</button>
                    <button type="button" class="friend-menu-item danger friend-menu-delete">삭제</button>
                    <button type="button" class="friend-menu-item cancel friend-menu-close">취소</button>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/friends_bootstrap.js"></script>
    <script src="../assets/js/app.js"></script>
</body>

</html>
