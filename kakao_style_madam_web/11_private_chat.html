<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김영희 ↔ 박철수</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="phone">
        <div class="status-bar chat">
            <span>9:41</span>
            <span>LTE 🔋</span>
        </div>
        <header class="header chat">
            <div style="display:flex;align-items:center;gap:12px;">
                <a class="back" href="02_home.html">‹</a>
                <div class="header-small-title">김영희 ↔ 박철수</div>
            </div>
            <div class="header-actions"><a href="12_progress_list.html">📋</a></div>
        </header>
        <section class="chat-content">
            <div class="message-row">
                <div class="message-avatar">김</div>
                <div>
                    <div class="message-name">김대표</div>
                    <div class="bubble">수락했습니다. 여성분 상세 프로필 공유드릴게요.</div>
                </div>
            </div>
            <div class="message-row me">
                <div>
                    <div class="bubble">감사합니다. 남성분 프로필도 전달드리겠습니다.</div>
                </div>
            </div>
            <div class="message-row">
                <div class="message-avatar">김</div>
                <div>
                    <div class="message-name">김대표</div>
                    <div class="customer-card-chat">
                        <div class="customer-card-top">
                            <div class="customer-mini-photo">👩</div>
                            <div>
                                <div class="customer-mini-title">김영희</div>
                                <div class="customer-mini-sub">34세 · 약사 · 서울</div>
                            </div>
                        </div>
                        <a class="button full secondary" href="12_progress_list.html">소개 진행 보기</a>
                    </div>
                </div>
            </div>
            <div class="message-row me">
                <div>
                    <div class="bubble">토요일 오후 3시 만남 가능하신지 확인 부탁드립니다.</div>
                </div>
            </div>
        </section>
        <div class="chat-input">
            <a class="button secondary" href="12_progress_list.html">진행</a>
            <div class="input-box">메시지 입력</div>
            <a class="button" href="11_private_chat.html">전송</a>
        </div>

    </main>
</body>
</html>
