<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 등록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="phone">
        <div class="status-bar">
            <span>9:41</span>
            <span>LTE 🔋</span>
        </div>
        <header class="header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a class="back" href="05_customer_list.html">‹</a>
                <div class="header-small-title">고객 등록</div>
            </div>
            <div class="header-actions"></div>
        </header>
        <section class="content gray">
            <div class="card">
                <div class="card-title">고객 등록</div>
                <div class="form-group">
                    <label class="form-label">이름</label>
                    <input class="form-input" type="text" value="김영희">
                </div>
                <div class="form-group">
                    <label class="form-label">성별</label>
                    <select class="form-select"><option>여성</option><option>남성</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">나이</label>
                    <input class="form-input" type="text" value="34세">
                </div>
                <div class="form-group">
                    <label class="form-label">지역 / 직업</label>
                    <input class="form-input" type="text" value="서울 / 약사">
                </div>
                <a class="button full" href="05_customer_list.html">등록 완료</a>
            </div>
        </section>

    </main>

</html>
