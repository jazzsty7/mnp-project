<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소개 요청</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="phone">
        <div class="status-bar">
            <span>9:41</span>
            <span>LTE 🔋</span>
        </div>
        <header class="header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a class="back" href="07_group_chat.html">‹</a>
                <div class="header-small-title">소개 요청</div>
            </div>
            <div class="header-actions"></div>
        </header>
        <section class="content gray">
            <div class="card">
                <div class="card-title">소개 요청하기</div>
                <div class="form-group">
                    <label class="form-label">상대 고객</label>
                    <select class="form-select"><option>김영희 · 34세 · 약사</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">내 고객 선택</label>
                    <select class="form-select"><option>박철수 · 38세 · 변호사</option><option>최민호 · 40세 · 사업가</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">전달할 말</label>
                    <textarea class="form-textarea">조건이 잘 맞는 것 같습니다. 한번 검토 부탁드립니다.</textarea>
                </div>
                <div class="pill-row">
                    <span class="pill">조건이 잘 맞습니다</span>
                    <span class="pill">검토 부탁드립니다</span>
                    <span class="pill">좋은 인연 같아요</span>
                </div>
                <a class="button full" href="09_request_list.html">소개 요청 보내기</a>
            </div>
        </section>

    </main>
</body>
</html>
