<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 올리기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="phone">
        <div class="status-bar">
            <span>9:41</span>
            <span>LTE 🔋</span>
        </div>
        <header class="header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a class="back" href="06_customer_detail.html">‹</a>
                <div class="header-small-title">고객 올리기</div>
            </div>
            <div class="header-actions"></div>
        </header>
        <section class="content gray">
            <div class="card">
                <div class="card-title">어느 방에 올릴까요?</div>
                <div class="form-group">
                    <label class="form-label">공유할 고객</label>
                    <select class="form-select"><option>김영희 · 34세 · 약사</option><option>박철수 · 38세 · 변호사</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">올릴 채팅방</label>
                    <select class="form-select"><option>서울 VIP방</option><option>강남 전문직방</option><option>재혼 모임방</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">함께 보낼 말</label>
                    <textarea class="form-textarea">서울 거주 약사 여성입니다. 전문직 남성 선호합니다.</textarea>
                </div>
                <div class="notice-box">전화번호, 상세주소 같은 민감한 정보는 공개방에 보이지 않습니다.</div>
                <br>
                <a class="button full" href="07_group_chat.html">채팅방에 올리기</a>
            </div>
        </section>

    </main>
</body>
</html>
