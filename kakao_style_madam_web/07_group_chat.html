<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 VIP방</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="phone">
        <div class="status-bar chat">
            <span>9:41</span>
            <span>LTE 🔋</span>
        </div>
        <header class="header chat">
            <div style="display:flex;align-items:center;gap:12px;">
                <a class="back" href="02_home.html">‹</a>
                <div class="header-small-title">서울 VIP방</div>
            </div>
            <div class="header-actions"><a href="05_customer_list.html">👥</a></div>
        </header>
        <section class="chat-content">
            <div class="message-row">
                <div class="message-avatar">김</div>
                <div>
                    <div class="message-name">김대표</div>
                    <div class="bubble">서울 거주 약사 여성 고객 있습니다.</div>
                </div>
            </div>
            <div class="message-row">
                <div class="message-avatar">김</div>
                <div>
                    <div class="message-name">김대표</div>
                    <div class="customer-card-chat">
                        <div class="customer-card-top">
                            <div class="customer-mini-photo">👩</div>
                            <div>
                                <div class="customer-mini-title">김영희</div>
                                <div class="customer-mini-sub">34세 · 서울 · 약사</div>
                            </div>
                        </div>
                        <div class="customer-mini-sub">희망: 서울 거주 전문직 남성</div>
                        <div class="action-grid">
                            <a class="button secondary" href="06_customer_detail.html">자세히</a>
                            <a class="button" href="10_request_create.html">소개 요청</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="message-row me">
                <div>
                    <div class="bubble">좋은 분 같습니다. 제 고객으로 요청드릴게요.</div>
                </div>
            </div>
            <div class="message-row">
                <div class="message-avatar">박</div>
                <div>
                    <div class="message-name">박대표</div>
                    <div class="bubble">38세 변호사 남성 있습니다.</div>
                </div>
            </div>
        </section>
        <div class="chat-input">
            <a class="button secondary" href="08_share_customer.html">고객 올리기</a>
            <div class="input-box">메시지 입력</div>
            <a class="button" href="10_request_create.html">전송</a>
        </div>

    </main>
</body>
</html>
