<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>김영희 ↔ 박철수</title>
        <style>

        :root {
            --yellow: #fee500;
            --yellow-deep: #f7d600;
            --bg: #f2f3f5;
            --chat-bg: #bacee0;
            --text: #191919;
            --muted: #777777;
            --line: #e7e7e7;
            --card: #ffffff;
            --soft: #f7f7f7;
            --danger: #ef4444;
            --blue: #3b82f6;
            --dark: #2f3437;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #dddddd;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Noto Sans KR", Arial, sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            margin: 0 auto;
            overflow: hidden;
            background: var(--bg);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 58px;
            padding: 12px 18px;
            background: var(--bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .header.chat {
            background: var(--chat-bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .header-title {
            font-size: 21px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .header-subtitle {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
        }

        .header-icon,
        .back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: 800;
        }

        .content {
            padding: 16px 16px 86px;
        }

        .content.chat-room {
            min-height: calc(100vh - 58px);
            padding: 14px 12px 92px;
            background: var(--chat-bg);
        }

        .section-title {
            margin: 18px 2px 10px;
            color: #555555;
            font-size: 14px;
            font-weight: 800;
        }

        .card {
            margin-bottom: 12px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--card);
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.04);
        }

        .notice {
            margin-bottom: 12px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #fff8cc;
            color: #6b5600;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.5;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 72px;
            padding: 12px 4px;
            border-bottom: 1px solid var(--line);
        }

        .list-item:last-child {
            border-bottom: 0;
        }

        .avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 52px;
            width: 52px;
            height: 52px;
            border-radius: 20px;
            background: var(--yellow);
            font-size: 24px;
            font-weight: 800;
        }

        .avatar.gray {
            background: #e5e7eb;
        }

        .avatar.blue {
            background: #dbeafe;
        }

        .item-main {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .item-desc {
            overflow: hidden;
            margin-top: 4px;
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .time {
            align-self: flex-start;
            color: #999999;
            font-size: 12px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eeeeee;
            color: #444444;
            font-size: 12px;
            font-weight: 800;
        }

        .badge.yellow {
            background: #fff3a3;
            color: #665300;
        }

        .badge.blue {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge.dark {
            background: #111827;
            color: #ffffff;
        }

        .badge.red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .button-row.center {
            justify-content: center;
        }

        .button-row.center .btn {
            min-width: 118px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 16px;
            border: 0;
            border-radius: 14px;
            background: var(--yellow);
            color: #111111;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }

        .btn.full {
            width: 100%;
        }

        .btn.secondary {
            background: #eeeeee;
            color: #333333;
        }

        .btn.dark {
            background: #111827;
            color: #ffffff;
        }

        .btn.danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn.disabled {
            background: #dddddd;
            color: #999999;
            pointer-events: none;
        }

        .field {
            margin-bottom: 14px;
        }

        .label {
            display: block;
            margin-bottom: 7px;
            color: #555555;
            font-size: 14px;
            font-weight: 800;
        }

        .input,
        .textarea,
        .fixed-text {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #ffffff;
            color: #222222;
            font-size: 16px;
            line-height: 1.45;
        }

        .textarea {
            align-items: flex-start;
            min-height: 94px;
        }

        .fixed-text {
            background: #f8f8f8;
            font-weight: 800;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            padding: 4px;
            border-radius: 16px;
            background: #e9eaec;
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            border-radius: 12px;
            color: #666666;
            text-align: center;
            font-size: 14px;
            font-weight: 900;
        }

        .tab.active {
            background: #ffffff;
            color: #111111;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .customer-card {
            position: relative;
            margin-top: 10px;
            padding: 15px;
            border: 1px solid #ececec;
            border-radius: 22px;
            background: linear-gradient(180deg, #ffffff 0%, #fffdf2 100%);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
        }

        .customer-card.compact {
            padding: 13px;
            border-radius: 18px;
            box-shadow: none;
        }

        .customer-card-top {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .customer-info {
            flex: 1;
            min-width: 0;
        }


        .customer-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-width: 0;
        }

        .customer-name {
            overflow: hidden;
            font-size: 19px;
            font-weight: 900;
            letter-spacing: -0.03em;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .customer-meta {
            margin-top: 5px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
        }

        .status-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 13px;
        }

        .status-row .badge {
            min-height: 32px;
            font-size: 13px;
        }

        .customer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 13px;
        }

        .customer-actions .btn {
            min-height: 46px;
            padding: 0 10px;
            font-size: 15px;
        }

        .customer-note {
            margin-top: 11px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.75);
            color: #555555;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.45;
        }

        .bubble-row {
            display: flex;
            margin-bottom: 14px;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .sender {
            margin: 0 0 5px 4px;
            color: #374151;
            font-size: 13px;
            font-weight: 800;
        }

        .bubble {
            max-width: 82%;
            padding: 11px 12px;
            border-radius: 15px;
            background: #ffffff;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .bubble.customer-bubble {
            max-width: 92%;
            padding: 0;
            background: transparent;
            box-shadow: none;
        }

        .customer-bubble .message-text {
            margin: 0 0 6px 2px;
            color: #374151;
            font-size: 14px;
            font-weight: 700;
        }

        .me .bubble {
            background: var(--yellow);
        }

        .chat-input {
            position: fixed;
            right: 0;
            bottom: 0;
            left: 0;
            max-width: 430px;
            margin: 0 auto;
            padding: 10px;
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .chat-input-inner {
            display: flex;
            gap: 8px;
        }

        .chat-input-text {
            flex: 1;
            min-height: 44px;
            padding: 12px 14px;
            border-radius: 22px;
            background: #f0f0f0;
            color: #999999;
            font-size: 14px;
        }

        .bottom-nav {
            position: fixed;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 20;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            max-width: 430px;
            margin: 0 auto;
            border-top: 1px solid var(--line);
            background: #ffffff;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 66px;
            color: #777777;
            font-size: 12px;
            font-weight: 800;
        }

        .nav-item span {
            display: block;
            margin-bottom: 2px;
            font-size: 22px;
        }

        .nav-item.active {
            color: #111111;
        }

        .login-wrap {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 36px 24px;
            background: var(--yellow);
        }

        .logo {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 86px;
            height: 86px;
            margin-bottom: 16px;
            border-radius: 30px;
            background: #111111;
            color: var(--yellow);
            font-size: 44px;
        }

        .logo-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .logo-desc {
            margin-top: 8px;
            color: #5a4b00;
            font-size: 15px;
            font-weight: 700;
        }

        .small-help {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }



        /* v4: 입력 가능 필드 / 읽기 전용 필드 구분 */
        input.form-input,
        select.form-input,
        textarea.form-textarea {
            width: 100%;
            min-height: 48px;
            padding: 12px 13px;
            border: 2px solid #d9d9d9;
            border-radius: 14px;
            background: #ffffff;
            color: var(--text);
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        input.form-input:focus,
        select.form-input:focus,
        textarea.form-textarea:focus {
            border-color: var(--yellow-deep);
            box-shadow: 0 0 0 3px rgba(254, 229, 0, 0.35);
        }

        textarea.form-textarea {
            min-height: 96px;
            line-height: 1.5;
            resize: vertical;
        }

        .readonly-label {
            display: block;
            margin-bottom: 7px;
            color: #555555;
            font-size: 13px;
            font-weight: 900;
        }

        .fixed-text,
        .readonly-field {
            padding: 13px 14px;
            border: 1px solid #eeeeee;
            border-radius: 14px;
            background: #f8f8f8;
            color: #333333;
            font-size: 15px;
            font-weight: 800;
            line-height: 1.45;
        }

        .field-help {
            margin-top: 7px;
            color: #888888;
            font-size: 12px;
            font-weight: 700;
        }

        /* v6: 하나의 가로형 고객카드 */
        .customer-card {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .customer-card.compact {
            width: min(348px, calc(100vw - 54px));
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .customer-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-small {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 40px;
            width: 40px;
            height: 51px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f3f4f6;
            color: #777777;
            font-size: 22px;
            box-shadow: none;
        }

        .customer-info {
            flex: 1;
            min-width: 0;
        }


        .customer-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-width: 0;
        }

        .customer-name {
            overflow: hidden;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: -0.03em;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .customer-meta {
            overflow: hidden;
            margin-top: 3px;
            color: #555555;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.35;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .customer-note {
            display: none;
        }

        .status-row {
            display: flex;
            flex: 0 0 auto;
            flex-wrap: nowrap;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 0;
        }

        .status-row .badge {
            min-height: 22px;
            padding: 3px 6px;
            font-size: 11px;
            white-space: nowrap;
        }

        .customer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .customer-actions .btn {
            min-height: 36px;
            padding: 0 10px;
            font-size: 14px;
        }

        .request-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
            padding: 4px;
            border-radius: 16px;
            background: #e9e9e9;
        }

        .request-toggle {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .request-tabs label {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border-radius: 13px;
            color: #666666;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
        }

        #tab-received:checked ~ .request-tabs label[for="tab-received"],
        #tab-sent:checked ~ .request-tabs label[for="tab-sent"] {
            background: #ffffff;
            color: #111111;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .request-panel {
            display: none;
        }

        #tab-received:checked ~ .received-panel,
        #tab-sent:checked ~ .sent-panel {
            display: block;
        }



        /* v8: 참여 요청 용어 / 고객카드 버튼 축소 및 사진 확대 */
        .customer-card {
            padding: 10px 12px;
        }

        .customer-card.compact {
            width: min(348px, calc(100vw - 54px));
            padding: 10px 12px;
        }

        .customer-card-top {
            align-items: flex-start;
            gap: 12px;
        }

        .photo-small {
            flex: 0 0 50px;
            width: 50px;
            height: 64px;
            border-radius: 9px;
            font-size: 25px;
        }

        .customer-title-row {
            min-height: 24px;
        }

        .customer-name {
            font-size: 17px;
        }

        .customer-meta {
            margin-top: 3px;
            font-size: 14px;
        }

        .status-row .badge {
            min-height: 20px;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 999px;
        }

        .customer-actions {
            display: flex;
            justify-content: flex-start;
            gap: 6px;
            margin-top: 8px;
            margin-left: 62px;
        }

        .customer-actions .btn {
            width: auto;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
        }

        

        /* v9: 고객카드 버튼 확장 / 채팅 입력창 + 버튼 / 1:1 진행상태 상단 표시 */
        .customer-card.compact {
            width: min(360px, calc(100vw - 44px));
            padding: 12px;
        }

        .customer-card-top {
            align-items: flex-start;
            gap: 14px;
        }

        .photo-small {
            flex: 0 0 64px;
            width: 64px;
            height: 82px;
            border-radius: 11px;
            font-size: 32px;
        }

        .customer-name {
            font-size: 18px;
            line-height: 1.25;
        }

        .customer-meta {
            margin-top: 4px;
            font-size: 14px;
            line-height: 1.25;
        }

        .customer-title-row {
            min-height: 27px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 124px;
        }

        .status-row .badge {
            min-height: 20px;
            padding: 2px 6px;
            font-size: 10px;
            line-height: 1.2;
            white-space: nowrap;
        }

        .customer-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            margin-left: 78px;
        }

        .customer-actions .btn {
            flex: 1;
            min-height: 36px;
            padding: 0 10px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 900;
        }

        .chat-input-inner.kakao {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
        }

        .attach-plus {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 36px;
            width: 36px;
            height: 36px;
            border: 1px solid #d6d6d6;
            border-radius: 50%;
            background: #ffffff;
            color: #333333;
            font-size: 25px;
            font-weight: 500;
            line-height: 1;
        }

        .chat-input-text.input-pill {
            display: flex;
            align-items: center;
            flex: 1;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 20px;
            background: #ffffff;
            color: #9a9a9a;
            font-size: 15px;
        }

        .send-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 42px;
            min-height: 36px;
            border-radius: 18px;
            background: var(--yellow);
            color: #111111;
            font-size: 14px;
            font-weight: 900;
        }

        .share-fab {
            position: absolute;
            right: 18px;
            bottom: 86px;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--yellow);
            color: #111111;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
            font-size: 36px;
            font-weight: 500;
            line-height: 1;
        }

        .status-pill.status-closed {
            background: #222 !important;
            color: #fff !important;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }


        /* v10: 1:1 대화방 상단 상태 + 햄버거 메뉴 */
        .private-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .private-title-wrap .header-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 18px;
        }

        .room-menu-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.54);
            color: #111111;
